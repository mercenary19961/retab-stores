name: CI

on:
  push:
    branches: [main, construction_phase]
  pull_request:

jobs:
  backend:
    name: PHP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, gd
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: cp .env.example .env && php artisan key:generate

      # In-memory SQLite via phpunit.xml; Vite is faked in tests/TestCase.php,
      # so no asset build is needed here.
      - name: Run tests
        run: php artisan test

  frontend:
    name: Types + builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Vite/esbuild strips types without checking — tsc is the real gate.
      - name: Type check
        run: npx tsc --noEmit

      - name: Client build
        run: npm run build

      - name: SSR build
        run: npm run build:ssr
